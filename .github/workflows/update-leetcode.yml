name: Update LeetCode Stats

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch LeetCode stats
        run: |
          SOLVED=0
          EASY=0
          MEDIUM=0
          HARD=0

          RESULT=$(curl -sf --max-time 10 "https://alfa-leetcode-api.onrender.com/oonixxxxx/solved" 2>/dev/null)
          if [ $? -eq 0 ]; then
            SOLVED=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('solvedProblem', 0))" 2>/dev/null || echo 0)
            EASY=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('easySolved', 0))" 2>/dev/null || echo 0)
            MEDIUM=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('mediumSolved', 0))" 2>/dev/null || echo 0)
            HARD=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('hardSolved', 0))" 2>/dev/null || echo 0)
          fi

          echo "SOLVED=$SOLVED" >> $GITHUB_ENV
          echo "EASY=$EASY" >> $GITHUB_ENV
          echo "MEDIUM=$MEDIUM" >> $GITHUB_ENV
          echo "HARD=$HARD" >> $GITHUB_ENV

      - name: Update JSON
        run: |
          python3 -c "
          import json, datetime
          with open('public/leetcode.json', 'r') as f:
              data = json.load(f)
          solved = int('${{ env.SOLVED }}')
          if solved > 0:
              data['solved'] = solved
              data['easy'] = int('${{ env.EASY }}')
              data['medium'] = int('${{ env.MEDIUM }}')
              data['hard'] = int('${{ env.HARD }}')
          data['updated'] = datetime.date.today().isoformat()
          with open('public/leetcode.json', 'w') as f:
              json.dump(data, f)
          "

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/leetcode.json
          git diff --cached --quiet || git commit -m "chore: update leetcode stats [skip ci]" && git push
